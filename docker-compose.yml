services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voxtera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voxtera_dev}
      POSTGRES_DB: ${POSTGRES_DB:-voxtera}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voxtera_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-voxtera}:${POSTGRES_PASSWORD:-voxtera_dev}@db:5432/${POSTGRES_DB:-voxtera}
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - voxtera_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - voxtera_net

volumes:
  postgres_data:

networks:
  voxtera_net:
    driver: bridge
