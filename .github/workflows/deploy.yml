# Required GitHub Secrets (same names used across all ATM AB deployments):
#   SERVER_HOST     - IP address or hostname of the Hetzner server
#   SERVER_USER     - SSH username (deploy)
#   SERVER_SSH_KEY  - Private SSH key content for authentication
#
# To add secrets: GitHub repo → Settings → Secrets and variables → Actions → New repository secret

name: Deploy to Hetzner

# Trigger on push to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout the repository
      # ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Set up Node.js
      # ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # ─────────────────────────────────────────
      # 3. Build the client (React → static files)
      # ─────────────────────────────────────────
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          # Production API URL — served via nginx proxy
          VITE_API_URL: /api

      # ─────────────────────────────────────────
      # 4. Build the server (TypeScript → JavaScript)
      # ─────────────────────────────────────────
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      # ─────────────────────────────────────────
      # 5. Set up SSH key for deployment
      # ─────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ─────────────────────────────────────────
      # 6. Deploy via rsync to Hetzner VPS
      #    Syncs the built files to the server
      # ─────────────────────────────────────────
      - name: Deploy client build
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            client/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/voxtera/client/dist/

      - name: Deploy server build
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            server/dist/ \
            server/package.json \
            server/package-lock.json \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/voxtera/server/

      - name: Deploy Docker Compose config
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            docker-compose.prod.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/voxtera/

      # ─────────────────────────────────────────
      # 7. Restart services on the server
      #    Installs production dependencies and
      #    restarts via Docker Compose
      # ─────────────────────────────────────────
      - name: Restart server on Hetzner
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /opt/voxtera

            # Install production server dependencies
            cd server && npm ci --omit=dev && cd ..

            # Restart services using Docker Compose
            docker compose -f docker-compose.prod.yml up -d --force-recreate server client

            echo "Deployment complete!"
          EOF

      # ─────────────────────────────────────────
      # 8. Clean up SSH key
      # ─────────────────────────────────────────
      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
