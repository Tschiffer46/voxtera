# Deploy Voxtera to Hetzner server (Type B — Docker + GHCR)
#
# Required GitHub Secrets (same names used across all ATM AB deployments):
#   SERVER_HOST     - Hetzner server IP (89.167.90.112)
#   SERVER_USER     - SSH username (deploy)
#   SERVER_SSH_KEY  - Private SSH key for the deploy user
#
# Uses automatic GITHUB_TOKEN for GHCR push (no manual PAT needed).
# Does NOT modify docker-compose.yml — that file is managed manually on the server.

name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/tschiffer46/voxtera:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ghcr.io/tschiffer46/voxtera:latest
            docker compose -f /home/deploy/hosting/docker-compose.yml up -d voxtera voxtera-db

            # Wait for database to be healthy, then run migrations
            echo "Waiting for database to be ready..."
            sleep 15
            docker exec voxtera node dist/db/migrate.js

            echo "Deployment complete!"
          ENDSSH
